<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Where You Travel - Book Your Journey</title>
    <link rel="stylesheet" href="form.css">
    <!-- CSS is completely separated into form.css -->
</head>
<body>
    
    <header>
        <nav> 
            <ul>
                <li><a href="index.html" data-key="nav-home">Home</a></li>
                <li><a href="AFood.html" data-key="nav-food">Food</a></li>
                <li><a href="Attractions.html" data-key="nav-attractions">Attractions</a></li>
                <li><a href="music.html" data-key="nav-music">Music</a></li>
                <li><a href="streets.html" data-key="nav-streets">Streets</a></li>
                <li><a href="#" data-key="nav-book" class="active-nav">Book Now</a></li>
                
              
                
                <li class="lang-selector">
                    <select id="language-select">
                        <option value="en">English</option>
                        <option value="ar">العربية (Arabic)</option>
                        <option value="ru">Русский (Russian)</option>
                        <option value="de">Deutsch (German)</option>
                        <option value="fr">Français (French)</option>
                    </select>
                </li>
            </ul>      
        </nav>
    </header>

    <div class="background"></div>

    <form id="bookingForm" action="thankyou.html">
        <h1 data-key="form-title">Visit Egypt</h1>
        <p data-key="form-subtitle">Please enter your information</p>

        <label for="name" data-key="lbl-name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" data-key="plh-name" required>

        <label for="email" data-key="lbl-email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" data-key="plh-email" required>

        <label for="phone" data-key="lbl-phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" data-key="plh-phone" required>

        <label data-key="lbl-gender">Gender</label>
        <div class="inline">
            <input type="radio" name="gender" id="male" value="male" required>
            <label for="male" data-key="lbl-male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female" data-key="lbl-female">Female</label>
        </div>

        <label for="arrival" data-key="lbl-arrival">Arrival Date</label>
        <input type="date" id="arrival" name="arrival" required>

        <label for="departure" data-key="lbl-departure">Departure Date</label>
        <input type="date" id="departure" name="departure" required>

        <label for="passport" data-key="lbl-passport">Passport</label>
        <input type="file" id="passport" name="passport" required>

        <label for="cities" data-key="lbl-destination">Where would you like to travel?</label>
        <select id="cities" required>
            <option value="" data-key="opt-choose">Choose one</option>
            <option value="Cairo">Cairo</option>
            <option value="Alexandria">Alexandria</option>
            <option value="Luxor">Luxor</option>
            <option value="Aswan">Aswan</option>
        </select>

        <!-- VISIT PLAN SECTION (added before "Choose the services you need") -->
        <div class="visit-plan-section" id="visitPlanSection">
            <h3 data-key="visit-plan-title">📋 Visit Plan</h3>
            <div class="plan-row">
                <div class="plan-field">
                    <label for="tripType" data-key="lbl-trip-type">Trip Type</label>
                    <select id="tripType">
                        <option value="leisure" data-key="opt-leisure">Leisure & Culture</option>
                        <option value="adventure" data-key="opt-adventure">Adventure & Safari</option>
                        <option value="historical" data-key="opt-historical">Historical Deep Dive</option>
                        <option value="family" data-key="opt-family">Family Friendly</option>
                    </select>
                </div>
                <div class="plan-field">
                    <label for="preferredGuide" data-key="lbl-guide">Preferred Guide Language</label>
                    <select id="preferredGuide">
                        <option value="english">English</option>
                        <option value="arabic">العربية (Arabic)</option>
                        <option value="german">Deutsch</option>
                        <option value="french">Français</option>
                        <option value="russian">Русский</option>
                    </select>
                </div>
                <div class="plan-field">
                    <label for="numTravelers" data-key="lbl-travelers">Number of Travelers</label>
                    <input type="number" id="numTravelers" min="1" max="20" value="2" step="1">
                </div>
            </div>
            <div class="extra-options">
                <div class="inline">
                    <input type="checkbox" id="guidedTour">
                    <label for="guidedTour" data-key="chk-guided">Guided Tour Package (+$199)</label>
                </div>
                <div class="inline">
                    <input type="checkbox" id="travelInsurance">
                    <label for="travelInsurance" data-key="chk-insurance">Travel Insurance (+$45)</label>
                </div>
                <div class="inline">
                    <input type="checkbox" id="visaAssistance">
                    <label for="visaAssistance" data-key="chk-visa">Visa Assistance ($30)</label>
                </div>
            </div>
        </div>
        
        <div class="section-divider"></div>
        
        <label data-key="lbl-services">Choose the services you need</label>

        <div class="inline">
            <input type="checkbox" id="tickets">
            <label for="tickets" data-key="chk-tickets">Airline Tickets</label>
        </div>

        <div class="inline">
            <input type="checkbox" id="car">
            <label for="car" data-key="chk-car">Rental Car</label>
        </div>

        <div class="inline">
            <input type="checkbox" id="hotel">
            <label for="hotel" data-key="chk-hotel">Hotel</label>
        </div>

       <input type="submit" value="Submit" data-key="btn-submit">
        <input type="reset" value="Reset" data-key="btn-reset">
    </form>
    

    <!-- JavaScript is completely separated into form.js -->
    <script src="script.js"></script>
</body>
</html>
